---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - controlplane.lab.local
  resources:
  - controlplanetests
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - controlplane.lab.local
  resources:
  - controlplanetests/finalizers
  verbs:
  - update
- apiGroups:
  - controlplane.lab.local
  resources:
  - controlplanetests/status
  verbs:
  - get
  - patch
  - update
