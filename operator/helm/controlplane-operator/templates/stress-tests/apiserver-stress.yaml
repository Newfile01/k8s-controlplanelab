{{- if .Values.stressTests.apiServer.enabled }}

apiVersion: controlplane.lab.local/v1alpha1
kind: ControlPlaneTest
metadata:
  name: apiserver-stress
  namespace: {{ .Values.namespace }}

spec:
  image: {{ .Values.stressTests.image }}
  replicas: {{ .Values.stressTests.replicas }}

  apiServerStress:
    enabled: true
    qps: {{ .Values.stressTests.apiServer.qps }}
    burst: {{ .Values.stressTests.apiServer.burst }}
    aggressiveReconcile: {{ .Values.stressTests.apiServer.aggressiveReconcile }}
    frequentStatusUpdates: {{ .Values.stressTests.apiServer.frequentStatusUpdates }}
    recreateResources: {{ .Values.stressTests.apiServer.recreateResources }}

{{- end }}