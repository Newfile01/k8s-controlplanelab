                          "datasource": {
                            "name": "prometheus"
                          },
                          "spec": {
                            "editorMode": "code",
                            "expr": "histogram_quantile(\r\n0.99,\r\nsum(rate(etcd_disk_backend_commit_duration_seconds_bucket[5m])) by (le)\r\n)",
                            "legendFormat": "__auto",
                            "range": true
                          }
                        },
                        "refId": "A",
                        "hidden": false
                      }
                    }
