            "spec": {
              "id": 4,
              "title": "ETCD fsync latency",
              "description": "Temps (s) nécessaire à etcd pour écrire ses données sur disque.\n\nPour réaliser une écriture API Server :\n→ etcd\n→ transaction BoltDB\n→ fsync disque\n→ commit\n\n- Histogramme : Regroupe les mesures dans des buckets\n- Rate : Transforme compteur cumulatif en débit moyens d'évènements sur 5 minutes\n- Sum : Regroupe tous les pods ETCD du cluster pour avoir la vision globale\n- Histogram_quantile : Reconstruit l'histogramme et calcul le percentile (p99 = 99% des valeurs inférieure à p99)\n\nOn a donc une représentation de la latence moyenne sur les 5 dernières minutes de l'écriture etcd, chaque point représente 99% des valeurs (de la plage des 5m précédentes) inférieures à la valeur présentée sur le graphe",
