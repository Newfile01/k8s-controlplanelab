apiVersion: controlplane.lab.local/v1alpha1
kind: ControlPlaneTest

metadata:
  name: controlplane-scenario
  namespace: default

spec:
  image: nginx:latest
  replicas: 2

  schedulerStress:
    enabled: true
    deploymentCount: 5
    replicasPerDeployment: 4

  apiServerStress:
    enabled: true
    frequentStatusUpdates: true
    aggressiveReconcile: true
    qps: 20
    burst: 50

  etcdStress:
    enabled: true
    configMapCount: 10
    configMapSizeKB: 64

  operatorStress:
    enabled: true
    profile: soft

    reconcile:
      maxConcurrent: 5
      qps: 10
      burst: 20
