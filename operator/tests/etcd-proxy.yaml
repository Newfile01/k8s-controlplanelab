apiVersion: v1
kind: ConfigMap
metadata:
  name: etcd-proxy-nginx
  namespace: kube-system

data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 12381;

        location /metrics {
          proxy_pass http://127.0.0.1:2381/metrics;
        }
      }
    }

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: etcd-local-proxy
  namespace: kube-system

spec:
  selector:
    matchLabels:
      app: etcd-local-proxy

  template:
    metadata:
      labels:
        app: etcd-local-proxy

    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        - name: nginx
          image: nginx:stable-alpine-perl

          ports:
            - containerPort: 12381
              hostPort: 12381

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

      volumes:
        - name: nginx-config
          configMap:
            name: etcd-proxy-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: etcd-local-proxy
  namespace: kube-system

  labels:
    app: etcd-local-proxy

spec:
  selector:
    app: etcd-local-proxy

  ports:
    - name: metrics
      port: 12381
      targetPort: 12381