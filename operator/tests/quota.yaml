apiVersion: v1
kind: ResourceQuota

metadata:
  name: operator-quota
  namespace: operator-system

spec:
  hard:

    # Pods
    pods: "360"

    # CPU / RAM
    requests.cpu: "8"
    requests.memory: 11Gi

    limits.cpu: "10"
    limits.memory: 12Gi

    # Déploiements
    count/deployments.apps: "100"

    # ReplicaSets
    count/replicasets.apps: "120"

    # Services
    services: "100"

    # ConfigMaps
    count/configmaps: "1200"

    # Secrets
    count/secrets: "1200"