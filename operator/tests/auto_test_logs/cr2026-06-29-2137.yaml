apiVersion: controlplane.lab.local/v1alpha1
kind: ControlPlaneTest
metadata:
    name: cr2026-06-29-2137
    namespace: operator-system

spec:
    image: "nginx"

    containerName: "app"

    deploymentCount: 50
    replicasPerDeployment: 4

    servicePort: 80
    targetPort: 80

    customLabel:
        key: "stress"
        value: "D1R1-R1-30s-180min"

    resourcesPerPod:
        cpuRequest: "20m"
        cpuLimit: "28m"
        memoryRequest: "30Mi"
        memoryLimit: "34Mi"

    configMapCount: 300
    configMapSizeKB: 300

    secretCount: 300
    secretSizeKB: 300

    # ==========================================================
    # SCHEDULER STRESS
    # ==========================================================

    schedulerStress:
        enabled: true

        nodeSelector:
            minikube.k8s.io/primary: "false"

        topologySpread: false

        affinityMode: ""

        affinitySelector:
            key: ""
            value: ""

        antiAffinityMode: ""

        antiAffinitySelector:
            key: ""
            value: ""

    # ==========================================================
    # API SERVER / ETCD STRESS
    # ==========================================================

    apiServerEtcdStress:
        enabled: true

        frequentStatusUpdates: true

        aggressiveReconcile: true
        reconcileRequeueDelay: 10

        recreateResources: false

    # ==========================================================
    # CONTROLLER MANAGER STRESS
    # ==========================================================

    controllerManagerStress:
        enabled: false

        recreateReplicaSets: false
        replicaRecreateDelay: 30

        aggressiveGarbageCollection: false
        garbageCollectionDelay: 30

    # ==========================================================
    # OPERATOR STRESS
    # ==========================================================

    operatorStress:
        enabled: false

        profile: "standard"

    # ==========================================================
    # POD LIFECYCLE STORM
    # ==========================================================

    podLifecycleStorm:
        enabled: false

        deletePodsRandomly: false
        deletePodsDelay: 30

        crashLoopSimulation: false

