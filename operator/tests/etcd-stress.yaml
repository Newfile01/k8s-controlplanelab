apiVersion: controlplane.lab.local/v1alpha1
kind: ControlPlaneTest

metadata:
  name: etcd-heavy
  namespace: operator-system

spec:
  image: nginx:latest
  replicas: 1

  etcdStress:
    enabled: true
    configMapCount: 1
    configMapSizeKB: 1
    secretCount: 1
    secretSizeKB: 1

  apiServerStress:
    enabled: true
    frequentStatusUpdates: false
    recreateResources: true
    qps: 80
    burst: 150
