apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  labels:
    name: prometheus-server-conf
  namespace: monitoring
data:
  prometheus.yml: |-
    global:
      scrape_interval: 20s
      evaluation_interval: 20s
    scrape_configs:
      ### Scraping de PROMETHEUS
      - job_name: 'prometheus'
        static_configs:
      # Prometheus s'auto surveille (permet d'obetnir des métriques d'utilisation de Prometheus)
          - targets: ['localhost:9090']
      ### Scraping du NODE-EXPORTER
      - job_name: 'node-exporter'
        static_configs:
          - targets:
            - 'node-exporter-prometheus-node-exporter.default.svc:9100'
      ### Scraping de l'API-SERVER
      - job_name: 'kubernetes-apiservers'
      # lancement du SD (Service Discovery) pour découvrir les Endpoints Kubernetes
        kubernetes_sd_configs:
          - role: endpoints
      # Dialogue avec l'api-server forcément en HTTPS
        scheme: https
      # On indique le certificat pour le dialogue
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      # Ainsi qu'un token du ServiceAccount qui est monté directement dans le pod
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      # On filtre pour aller chercher namespace "default", service "kubernetes", port "https" (=443)
      # Ce qui correspond à l'API-SERVER
        relabel_configs:
          - source_labels:
              [
                __meta_kubernetes_namespace,
                __meta_kubernetes_service_name,
                __meta_kubernetes_endpoint_port_name
              ]
            action: keep
            regex: default;kubernetes;https
      ### Screaping KUBE-STATE-METRICS
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets:
            - 'kube-state-metrics.default.svc:8080'